<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI快侠 - 在线使用</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6C63FF;
      --primary-dark: #5A52E0;
      --accent: #FF6B6B;
      --bg-dark: #0F0E17;
      --bg-card: #1A1932;
      --bg-input: #16152B;
      --text: #FFFFFE;
      --text-secondary: #A7A9BE;
      --success: #2ED573;
      --error: #FF4757;
      --gradient: linear-gradient(135deg, #6C63FF 0%, #FF6B6B 100%);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(15, 14, 23, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
    }

    .back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--primary); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .credits-badge {
      padding: 4px 10px;
      background: rgba(108, 99, 255, 0.15);
      border-radius: 20px;
      color: var(--primary);
      font-size: 13px;
    }

    .btn-login {
      padding: 8px 16px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-logout {
      padding: 6px 12px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Auth Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal-box {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .modal-box h2 { margin-bottom: 20px; font-size: 1.25rem; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: var(--bg-input);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .modal-tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
    }

    .modal-tab.active {
      background: rgba(108, 99, 255, 0.2);
      border-color: var(--primary);
      color: var(--primary);
    }

    .login-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: center;
    }

    /* ===== Main Container ===== */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .hero-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-section h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .hero-section h1 .gradient {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-section p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ===== Input Section ===== */
    .input-section {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 24px;
    }

    .input-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      background: var(--bg-input);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    textarea::placeholder {
      color: var(--text-secondary);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-paste {
      background: rgba(108, 99, 255, 0.15);
      color: var(--primary);
      border: 1px solid rgba(108, 99, 255, 0.3);
    }

    .btn-paste:hover {
      background: rgba(108, 99, 255, 0.25);
    }

    .btn-parse {
      background: var(--gradient);
      color: white;
      flex: 1;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    }

    .btn-parse:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    .btn-parse:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== Result Section ===== */
    .result-section {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.05);
      display: none;
    }

    .result-section.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .result-icon {
      width: 48px;
      height: 48px;
      background: rgba(46, 213, 115, 0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 700;
    }

    .result-platform {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .video-info {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      color: var(--text-secondary);
      font-size: 14px;
      min-width: 50px;
    }

    .info-value {
      font-size: 14px;
      flex: 1;
    }

    .btn-download {
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
    }

    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    /* ===== Loading ===== */
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.show { display: block; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(108, 99, 255, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Error ===== */
    .error-msg {
      display: none;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: 12px;
      padding: 16px;
      color: var(--error);
      margin-top: 16px;
      font-size: 14px;
    }

    .error-msg.show { display: block; }

    /* ===== Supported Platforms ===== */
    .platforms-section {
      margin-top: 40px;
      text-align: center;
    }

    .platforms-title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .platform-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .platform-tag {
      padding: 6px 14px;
      background: var(--bg-card);
      border-radius: 50px;
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Mobile ===== */
    @media (max-width: 600px) {
      .container { padding: 24px 16px; }
      .hero-section h1 { font-size: 1.5rem; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">AI快侠</span>
    </a>
    <div class="header-actions">
      <div class="user-bar" id="userBar" style="display:none;">
        <span class="credits-badge">💰 <span id="creditsCount">0</span> 积分</span>
        <span id="userName"></span>
        <button class="btn-logout" onclick="logout()">退出</button>
      </div>
      <button class="btn-login" id="loginBtn" onclick="openAuthModal()">登录 / 注册</button>
      <a href="index.html" class="back-link">← 返回首页</a>
    </div>
  </header>

  <!-- 登录模态框 -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-box">
      <h2 id="authModalTitle">登录 AI快侠</h2>
      <div class="modal-tabs">
        <button class="modal-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</button>
        <button class="modal-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</button>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="至少6位" required>
        </div>
        <button type="submit" class="btn btn-parse" style="width:100%;justify-content:center;">登录</button>
      </form>
      <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="至少3位" required minlength="3">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="至少6位" required minlength="6">
        </div>
        <div class="form-group">
          <label>昵称（可选）</label>
          <input type="text" id="regNickname" placeholder="显示名称">
        </div>
        <button type="submit" class="btn btn-parse" style="width:100%;justify-content:center;">注册并登录</button>
        <p class="login-hint">注册即送 10 积分，每次下载消耗 1 积分</p>
      </form>
      <button onclick="closeAuthModal()" style="margin-top:12px;width:100%;padding:10px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text-secondary);cursor:pointer;">取消</button>
    </div>
  </div>

  <!-- Main -->
  <div class="container">
    <!-- Hero -->
    <div class="hero-section">
      <h1><span class="gradient">AI快侠</span> 在线使用</h1>
      <p>粘贴视频分享文字，AI自动识别链接，一键下载</p>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-label">
        📋 粘贴视频分享文字
      </div>
      <div class="input-wrapper">
        <textarea id="urlInput" placeholder="例如：卷疯了！61 键满配 + RGB 光效... https://v.douyin.com/xxx 复制此链接，打开【抖音】，直接观看视频！

直接粘贴整段文字即可，AI会自动识别链接"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-paste" onclick="pasteFromClipboard()">
          📋 粘贴
        </button>
        <button class="btn btn-parse" id="parseBtn" onclick="parseVideo()">
          🔍 解析下载
        </button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在解析视频...</p>
    </div>

    <!-- Result Section -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <div class="result-icon">✅</div>
        <div>
          <div class="result-title">解析成功</div>
          <div class="result-platform" id="resultPlatform">-</div>
        </div>
      </div>
      <div class="video-info">
        <div class="info-row">
          <span class="info-label">📝 标题</span>
          <span class="info-value" id="resultTitle">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">👤 作者</span>
          <span class="info-value" id="resultAuthor">-</span>
        </div>
      </div>
      <p class="login-hint" id="downloadHint">下载需登录，注册送 10 积分（每次下载 1 积分）</p>
      <button class="btn-download" onclick="downloadVideo()">
        ⬇️ 下载视频
      </button>
    </div>

    <!-- Supported Platforms -->
    <div class="platforms-section">
      <div class="platforms-title">支持的平台</div>
      <div class="platform-tags">
        <span class="platform-tag">🎵 抖音</span>
        <span class="platform-tag">🎬 快手</span>
        <span class="platform-tag">📺 B站</span>
        <span class="platform-tag">📕 小红书</span>
        <span class="platform-tag">▶️ YouTube</span>
        <span class="platform-tag">🎶 TikTok</span>
        <span class="platform-tag">📹 微视</span>
        <span class="platform-tag">🍉 西瓜视频</span>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // API配置：GitHub Pages 页面可调用本机后端（Chrome 允许 HTTPS→localhost）
    function getApiBase() {
      if (window.AIKUAIXIA_API_BASE) return window.AIKUAIXIA_API_BASE;
      return 'http://localhost:8080/api/v1';
    }

    let currentData = null;
    let authToken = localStorage.getItem('aikuaixia_token') || '';
    let authUser = null;

    function authHeaders() {
      const h = { 'Content-Type': 'application/json' };
      if (authToken) h['Authorization'] = 'Bearer ' + authToken;
      return h;
    }

    function updateAuthUI() {
      const loggedIn = !!authToken;
      document.getElementById('userBar').style.display = loggedIn ? 'flex' : 'none';
      document.getElementById('loginBtn').style.display = loggedIn ? 'none' : 'block';
      if (loggedIn && authUser) {
        document.getElementById('userName').textContent = authUser.nickname || authUser.username || '';
      }
    }

    function openAuthModal() {
      document.getElementById('authModal').classList.add('show');
    }

    function closeAuthModal() {
      document.getElementById('authModal').classList.remove('show');
    }

    function switchAuthTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      try {
        const res = await fetch(`${getApiBase()}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUsername').value.trim(),
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json();
        if (data.code === 200 && data.data?.token) {
          authToken = data.data.token;
          authUser = data.data;
          localStorage.setItem('aikuaixia_token', authToken);
          closeAuthModal();
          await refreshProfile();
          showToast('登录成功！');
        } else {
          showError(data.error || '登录失败');
        }
      } catch (err) {
        showError('无法连接服务器，请确认后端已启动（localhost:8080）');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      try {
        const res = await fetch(`${getApiBase()}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value.trim(),
            password: document.getElementById('regPassword').value,
            nickname: document.getElementById('regNickname').value.trim() || undefined,
          }),
        });
        const data = await res.json();
        if (data.code === 200 && data.data?.token) {
          authToken = data.data.token;
          authUser = data.data;
          localStorage.setItem('aikuaixia_token', authToken);
          closeAuthModal();
          await refreshProfile();
          showToast('注册成功，已赠送 10 积分！');
        } else {
          showError(data.error || '注册失败');
        }
      } catch (err) {
        showError('无法连接服务器，请确认后端已启动（localhost:8080）');
      }
    }

    async function refreshProfile() {
      if (!authToken) return;
      try {
        const res = await fetch(`${getApiBase()}/user/profile`, {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        const data = await res.json();
        if (data.code === 200) {
          authUser = data.data;
          document.getElementById('creditsCount').textContent = data.data.credits ?? data.data.balance ?? 0;
          updateAuthUI();
        }
      } catch (_) {}
    }

    function logout() {
      authToken = '';
      authUser = null;
      localStorage.removeItem('aikuaixia_token');
      updateAuthUI();
      showToast('已退出登录');
    }

    // 页面加载时恢复登录态
    if (authToken) {
      refreshProfile();
    } else {
      updateAuthUI();
    }

    // 从剪贴板粘贴
    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
        showToast('已粘贴');
      } catch (e) {
        showToast('无法读取剪贴板，请手动粘贴');
      }
    }

    // 解析视频
    async function parseVideo() {
      const input = document.getElementById('urlInput').value.trim();
      if (!input) {
        showError('请输入视频链接或分享文字');
        return;
      }

      // 隐藏之前的结果和错误
      hideError();
      document.getElementById('resultSection').classList.remove('show');
      
      // 显示加载
      document.getElementById('loading').classList.add('show');
      document.getElementById('parseBtn').disabled = true;

      try {
        const response = await fetch(`${getApiBase()}/parse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: input })
        });

        const result = await response.json();

        if (result.code === 200) {
          currentData = result.data;
          
          // 显示结果
          document.getElementById('resultPlatform').textContent = `平台: ${result.data.platform}`;
          document.getElementById('resultTitle').textContent = result.data.title || '未知';
          document.getElementById('resultAuthor').textContent = result.data.author || '未知';
          document.getElementById('resultSection').classList.add('show');
          
          showToast('解析成功！');
        } else {
          showError(result.error || '解析失败，请检查链接是否正确');
        }
      } catch (e) {
        showError('网络错误，请检查网络连接');
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('parseBtn').disabled = false;
      }
    }

    // 下载视频（需登录，带 Authorization）
    async function downloadVideo() {
      if (!currentData) return;

      if (!authToken) {
        showError('请先登录后再下载（注册送 10 积分）');
        openAuthModal();
        return;
      }
      
      const input = document.getElementById('urlInput').value.trim();
      // 提取原始链接
      const urlMatch = input.match(/https?:\/\/v\.douyin\.com\/\w+\/?/i) ||
                       input.match(/https?:\/\/v\.kuaishou\.com\/\w+\/?/i) ||
                       input.match(/https?:\/\/b23\.tv\/\w+\/?/i) ||
                       input.match(/https?:\/\/xhslink\.com\/\w+\/?/i) ||
                       input.match(/https?:\/\/youtu\.be\/\w+\/?/i) ||
                       input.match(/https?:\/\/vm\.tiktok\.com\/\w+\/?/i) ||
                       input.match(/https?:\/\/[^\s]+/i);
      const shareUrl = urlMatch ? urlMatch[0] : input;
      
      const downloadUrl = `${getApiBase()}/download/v2?url=${encodeURIComponent(shareUrl)}&platform=${currentData.platform}&title=${encodeURIComponent(currentData.title || 'video')}`;
      
      // 显示下载中状态
      const btn = document.querySelector('.btn-download');
      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳ 正在下载...';
      btn.disabled = true;
      
      try {
        // 使用fetch下载文件
        const response = await fetch(downloadUrl, {
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            logout();
            openAuthModal();
            throw new Error('登录已过期，请重新登录');
          }
          if (response.status === 402) {
            throw new Error('积分不足，请充值后再下载');
          }
          const errBody = await response.json().catch(() => ({}));
          throw new Error(errBody.error || `下载失败 (${response.status})`);
        }
        
        // 获取文件blob
        const blob = await response.blob();
        
        // 创建下载链接
        const blobUrl = URL.createObjectURL(blob);
        const filename = `AI快侠_${currentData.platform}_${Date.now()}.mp4`;
        
        // 触发下载
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        // 清理
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        
        showToast('下载成功！');
        refreshProfile();
      } catch (e) {
        showError(e.message || '下载失败');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // 显示错误
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    // 隐藏错误
    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }

    // 显示Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 快捷键支持
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        parseVideo();
      }
    });
  </script>

</body>
